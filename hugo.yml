# baseURL: 'https://example.org/'
# languageCode: 'zh-cn'
title: "档案馆"
copyright: "© 2025 档案馆 - 兔人协会"
theme: "PaperMod"


# ---------- ---------- ---------- ---------- ---------- ---------- ---------- ---------- ---------- ---------- #

outputs:
  home:
    - HTML
    # - RSS
    - JSON
minify:
  disableXML: true
  minifyOutput: true

# ---------- ---------- ---------- ---------- ---------- ---------- ---------- ---------- ---------- ---------- #
markup:
  goldmark:
    parser:
      wrapStandAloneImageWithinParagraph: false
      extensions:
        # 禁用可能触发代码块的多余扩展（按需保留必要功能）
        definitionList: true
        footnote: true
        linkify: true
        strikethrough: true
        table: true
        taskList: true
        typographer: true
    renderer:
      unsafe: true
  highlight:
    noClasses: true
    anchorLineNos: false
    codeFences: true  # 保留代码围栏解析
    guessSyntax: true
    lineNos: false
    style: "algol_nu"






