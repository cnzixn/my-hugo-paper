function copyDstSymbol(text, tipDom) {
  const temp = document.createElement('textarea');
  temp.value = text;
  document.body.appendChild(temp);
  temp.select();
  document.execCommand('copy');
  document.body.removeChild(temp);
  tipDom.innerText = "ه·²ه¤چهˆ¶";
  setTimeout(()=>tipDom.innerText = "",1200);
}

    card.className = "dst-card-item";
    // ç›´وژ¥é—­هŒ…وگ؛ه¸¦ه®Œو•´ copyTextï¼Œن¸چè¯»هڈ–é،µé‌¢DOMو–‡وœ¬
    card.onclick = function(){
      const tipDom = document.getElementById(tipId);
      copyDstSymbol(copyText, tipDom);
    };

    card.innerHTML = `

      <span class="dst-name-text">

      </span>
      <span id="${tipId}" class="dst-tip"></span>
    `;
    container.appendChild(card);
  })
}
